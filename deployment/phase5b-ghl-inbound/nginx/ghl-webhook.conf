# Static proposal only. Do not install without an approved production diff.
# Place the zone in nginx's http context:
limit_req_zone $binary_remote_addr zone=tanaghom_ghl_webhook:10m rate=30r/s;

# Place this location in the existing Tanaghom TLS server block:
location = /api/webhooks/ghl {
    limit_req zone=tanaghom_ghl_webhook burst=120 nodelay;
    limit_req_status 429;
    client_max_body_size 256k;

    proxy_pass http://127.0.0.1:3200;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_connect_timeout 3s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
}
