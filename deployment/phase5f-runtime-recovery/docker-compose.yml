name: tanaghom-phase5f-runtime-recovery

x-n8n-environment: &n8n-environment
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_DATABASE: n8n
  DB_POSTGRESDB_USER: n8n
  DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/postgres_password
  EXECUTIONS_MODE: queue
  OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"
  QUEUE_BULL_REDIS_HOST: redis
  QUEUE_BULL_REDIS_PORT: "6379"
  QUEUE_BULL_REDIS_DB: "0"
  QUEUE_BULL_REDIS_PASSWORD_FILE: /run/secrets/redis_password
  QUEUE_BULL_REDIS_TIMEOUT_THRESHOLD: "30000"
  QUEUE_WORKER_LOCK_DURATION: "8000"
  QUEUE_WORKER_LOCK_RENEW_TIME: "2000"
  QUEUE_WORKER_STALLED_INTERVAL: "2000"
  QUEUE_WORKER_MAX_STALLED_COUNT: "2"
  N8N_GRACEFUL_SHUTDOWN_TIMEOUT: "5"
  N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key
  N8N_USER_MANAGEMENT_DISABLED: "true"
  N8N_DIAGNOSTICS_ENABLED: "false"
  N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
  N8N_TEMPLATES_ENABLED: "false"
  N8N_METRICS: "true"
  N8N_BLOCK_ENV_ACCESS_IN_NODE: "true"
  N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES: "true"
  N8N_SSRF_PROTECTION_ENABLED: "true"
  NODES_EXCLUDE: '["n8n-nodes-base.executeCommand","n8n-nodes-base.readWriteFile","n8n-nodes-base.ssh"]'
  EXECUTIONS_DATA_SAVE_ON_ERROR: all
  EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
  EXECUTIONS_DATA_SAVE_ON_PROGRESS: "false"
  EXECUTIONS_DATA_PRUNE: "false"
  N8N_HOST: n8n
  N8N_LISTEN_ADDRESS: 0.0.0.0
  N8N_PORT: "5678"
  N8N_PROTOCOL: http
  N8N_EDITOR_BASE_URL: http://n8n:5678/
  WEBHOOK_URL: http://n8n:5678/
  TZ: UTC
  GENERIC_TIMEZONE: UTC

x-n8n-service: &n8n-service
  image: docker.n8n.io/n8nio/n8n:2.26.8@sha256:0afb71a39e51637b4d5b4010d90e68bc502d3ca1d2a4d953eb5fcd7d86330ccd
  environment:
    <<: *n8n-environment
  secrets:
    - postgres_password
    - redis_password
    - n8n_encryption_key
  volumes:
    - n8n_data:/home/node/.n8n
    - ./fixtures:/fixtures:ro
    - ./scripts:/runtime-scripts:ro
  networks:
    - runtime
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  pids_limit: 300
  tmpfs:
    - /tmp:size=256m,mode=1777

services:
  postgres:
    image: postgres:16.14-alpine3.24@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    restart: "no"
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - runtime
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 2s
      timeout: 3s
      retries: 30
    cpus: 0.75
    mem_limit: 768m
    pids_limit: 150

  redis:
    image: redis:7.2.14-alpine3.21@sha256:dfa18828cbc07b3ae6a95ec7343f6c214fdee2d836197b4be8e9904420762cd8
    restart: "no"
    command:
      - /bin/sh
      - -ec
      - |
        exec redis-server \
          --appendonly yes \
          --appendfsync always \
          --save 60 1 \
          --maxmemory 128mb \
          --maxmemory-policy noeviction \
          --requirepass "$$(cat /run/secrets/redis_password)"
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    networks:
      - runtime
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$(cat /run/secrets/redis_password)\" redis-cli ping | grep -qx PONG"]
      interval: 2s
      timeout: 3s
      retries: 30
    cpus: 0.25
    mem_limit: 256m
    pids_limit: 100

  n8n:
    <<: *n8n-service
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5678/healthz/readiness').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 15s
    cpus: 1.0
    mem_limit: 1024m

  n8n-worker:
    <<: *n8n-service
    restart: "no"
    command: ["worker", "--concurrency=2"]
    environment:
      <<: *n8n-environment
      QUEUE_HEALTH_CHECK_ACTIVE: "true"
      QUEUE_HEALTH_CHECK_PORT: "5680"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5680/healthz/readiness').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 15s
    cpus: 1.0
    mem_limit: 1024m

networks:
  runtime:
    internal: true

volumes:
  postgres_data:
  redis_data:
  n8n_data:

secrets:
  postgres_password:
    file: ${TANAGHOM_RUNTIME_SECRET_DIR:?set TANAGHOM_RUNTIME_SECRET_DIR}/postgres_password
  redis_password:
    file: ${TANAGHOM_RUNTIME_SECRET_DIR:?set TANAGHOM_RUNTIME_SECRET_DIR}/redis_password
  n8n_encryption_key:
    file: ${TANAGHOM_RUNTIME_SECRET_DIR:?set TANAGHOM_RUNTIME_SECRET_DIR}/n8n_encryption_key
