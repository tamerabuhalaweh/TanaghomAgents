name: tanaghom-dashboard-canary

services:
  dashboard:
    image: tanaghom-dashboard-canary:canary
    build:
      context: ../..
      dockerfile: deployment/dashboard-canary/Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: canary
      APP_BASE_URL: http://127.0.0.1:3200
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    secrets:
      - database_url
      - supabase_url
      - supabase_publishable_key
      - supabase_jwks_url
    ports:
      - "127.0.0.1:3200:3000"
    networks:
      - outbound
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cpus: 0.75
    mem_limit: 768m
    mem_reservation: 256m
    pids_limit: 200
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  outbound:
    name: tanaghom-dashboard-outbound
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.251.0/29

secrets:
  database_url:
    file: ./secrets/database_url
  supabase_url:
    file: ./secrets/supabase_url
  supabase_publishable_key:
    file: ./secrets/supabase_publishable_key
  supabase_jwks_url:
    file: ./secrets/supabase_jwks_url
