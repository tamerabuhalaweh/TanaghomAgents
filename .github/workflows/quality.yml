    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase5_inbound_test
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase5_inbound_test
      APP_ENV: integration
      GHL_INBOUND_LOAD_EVENTS: 10000
      GHL_INBOUND_EVIDENCE_PATH: tmp/ghl-inbound-load-evidence.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
