name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
      - run: npm test
      - run: deployment/phase5d-production-update/scripts/validate-package.sh

  database-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:database
      - run: deployment/phase5d-production-update/scripts/test-disposable-backup.sh "$DATABASE_TEST_URL" 0018_conversation_capacity_backpressure

  dashboard-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run typecheck:dashboard
      - run: npm run build:dashboard

  dashboard-api-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_api_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_api_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_api_test
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_api_test
      SUPABASE_URL: http://127.0.0.1:43191
      SUPABASE_PUBLISHABLE_KEY: integration-publishable-key
      APP_ENV: integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -f packages/database/seeds/staging.sql
      - run: npm run build:dashboard
      - run: npm run test:dashboard-api

  phase3-workflow-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_workflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_workflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_workflow_test
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_workflow_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -f packages/database/seeds/staging.sql
      - run: npm run generate:phase3-workflows
      - run: git diff --exit-code -- n8n/workflows/phase3
      - run: npm run test:phase3-workflows

  phase4-workflow-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_phase4_workflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_phase4_workflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase4_workflow_test
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase4_workflow_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -f packages/database/seeds/staging.sql
      - run: npm run generate:phase4-workflows
      - run: git diff --exit-code -- n8n/workflows/phase4
      - run: npm run test:phase4-workflows

  phase5-workflow-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_phase5_workflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_phase5_workflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase5_workflow_test
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase5_workflow_test
      PHASE5_LIFECYCLE_EVIDENCE_PATH: tmp/phase5-sales-lifecycle-evidence.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -f packages/database/seeds/staging.sql
      - run: npm run generate:phase5-workflows
      - run: git diff --exit-code -- n8n/workflows/phase5
      - run: npm run test:phase5-workflows
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase5-sales-lifecycle-evidence
          path: tmp/phase5-sales-lifecycle-evidence.json
          if-no-files-found: error

  phase5-inbound-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_phase5_inbound_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_phase5_inbound_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase5_inbound_test
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase5_inbound_test
      APP_ENV: integration
      GHL_INBOUND_LOAD_EVENTS: 10000
      GHL_INBOUND_EVIDENCE_PATH: tmp/ghl-inbound-load-evidence.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -f packages/database/seeds/staging.sql
      - run: npm run build:dashboard
      - run: npm run test:phase5-inbound
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase5-ghl-inbound-load-evidence
          path: tmp/ghl-inbound-load-evidence.json
          if-no-files-found: warn

  phase5-intelligence-evaluation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:phase5-intelligence
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase5-conversation-intelligence-evidence
          path: tmp/conversation-intelligence-evaluation.json
          if-no-files-found: error

  phase5-capacity-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_phase5_capacity_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_phase5_capacity_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase5_capacity_test
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase5_capacity_test
      GHL_CAPACITY_LOAD_EVENTS: 10000
      GHL_CAPACITY_WORKERS: 16
      GHL_CAPACITY_EVIDENCE_PATH: tmp/conversation-capacity-evidence.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -f packages/database/seeds/staging.sql
      - run: npm run test:phase5-capacity
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase5-conversation-capacity-evidence
          path: tmp/conversation-capacity-evidence.json
          if-no-files-found: error
          retention-days: 30

  phase5-resilience-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_phase5_resilience_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_phase5_resilience_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase5_resilience_test
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase5_resilience_test
      GHL_RESILIENCE_BURST_EVENTS: 1000
      GHL_RESILIENCE_SOAK_SECONDS: 10
      GHL_RESILIENCE_SOAK_WAVE_EVENTS: 25
      GHL_RESILIENCE_WORKERS: 8
      GHL_RESILIENCE_MODEL_LATENCY_MS: 10
      GHL_RESILIENCE_EVIDENCE_PATH: tmp/conversation-resilience-evidence.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -f packages/database/seeds/staging.sql
      - run: npm run test:phase5-resilience
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase5-conversation-resilience-evidence
          path: tmp/conversation-resilience-evidence.json
          if-no-files-found: error
          retention-days: 30

  phase5-runtime-recovery-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      N8N_RUNTIME_RECOVERY_EVIDENCE_PATH: tmp/n8n-runtime-recovery-evidence.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:phase5-runtime-recovery
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase5-n8n-runtime-recovery-evidence
          path: tmp/n8n-runtime-recovery-evidence.json
          if-no-files-found: error
          retention-days: 30

  dashboard-image-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: sh -n deployment/dashboard-canary/entrypoint.sh deployment/dashboard-canary/scripts/*.sh
      - run: docker compose -f deployment/dashboard-canary/docker-compose.yml config --quiet
      - run: docker build --pull -f deployment/dashboard-canary/Dockerfile -t tanaghom-dashboard-canary:test .
