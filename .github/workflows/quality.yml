      - run: npm run test:phase5-capacity
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase5-conversation-capacity-evidence
          path: tmp/conversation-capacity-evidence.json
          if-no-files-found: error
          retention-days: 30

  phase5g-quality-shadow-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17.6-alpine3.22@sha256:ef257d85f76e48da1c64832459b59fcaba1a4dac97bf5d7450c77753542eee94
