name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
      - run: npm test

  database-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run test:database

  dashboard-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run typecheck:dashboard
      - run: npm run build:dashboard
