name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
      - run: npm test
      - run: deployment/phase5d-production-update/scripts/validate-package.sh
      - run: deployment/phase5f-database-bridge/scripts/validate-package.sh
      - run: deployment/phase5f-production-update/scripts/validate-package.sh
      - run: deployment/phase5g-production-update/scripts/validate-package.sh
      - run: deployment/phase5g-shadow-production-update/scripts/validate-package.sh
      - run: deployment/phase6-agent-registry-production-update/scripts/validate-package.sh

  database-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:database
      - run: deployment/production-database-backup/test-disposable-backup.sh "$DATABASE_TEST_URL" 0022_agent_registry

  phase5f-database-bridge-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17.6-alpine3.22@sha256:ef257d85f76e48da1c64832459b59fcaba1a4dac97bf5d7450c77753542eee94
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_phase5f_bridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_phase5f_bridge_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase5f_bridge_test
    steps:
      - uses: actions/checkout@v4
      - run: deployment/phase5f-database-bridge/scripts/test-disposable-lifecycle.sh "$DATABASE_TEST_URL"
      - run: deployment/production-database-backup/test-disposable-backup.sh "$DATABASE_TEST_URL" 0014_supervised_conversation_ownership

  phase5f-production-update-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:17.6-alpine3.22@sha256:ef257d85f76e48da1c64832459b59fcaba1a4dac97bf5d7450c77753542eee94
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_phase5f_update_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_phase5f_update_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase5f_update_test
    steps:
      - uses: actions/checkout@v4
      - run: deployment/phase5f-production-update/scripts/test-disposable-lifecycle.sh "$DATABASE_TEST_URL"

  phase5g-production-update-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:17.6-alpine3.22@sha256:ef257d85f76e48da1c64832459b59fcaba1a4dac97bf5d7450c77753542eee94
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_phase5g_update_test
        ports:
