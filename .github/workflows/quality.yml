    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_workflow_test
        ports:
          - 5432:5432
        options: >-
