    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17.6-alpine3.22@sha256:ef257d85f76e48da1c64832459b59fcaba1a4dac97bf5d7450c77753542eee94
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_phase5g_shadow_update_test
        ports:
