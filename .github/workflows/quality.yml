        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_phase5g_shadow_update_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase5g_shadow_update_test
      N8N_SHADOW_TEST_POSTGRES_PORT: 55444
    steps:
      - uses: actions/checkout@v4
      - run: deployment/phase5g-shadow-production-update/scripts/validate-package.sh
      - run: deployment/phase5g-shadow-production-update/scripts/test-disposable-lifecycle.sh "$DATABASE_TEST_URL"
      - run: deployment/phase5g-shadow-production-update/scripts/test-disposable-workflow-lifecycle.sh

  phase6-agent-registry-production-update-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:17.6-alpine3.22@sha256:ef257d85f76e48da1c64832459b59fcaba1a4dac97bf5d7450c77753542eee94
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_phase6_registry_update_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_phase6_registry_update_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_phase6_registry_update_test
    steps:
      - uses: actions/checkout@v4
      - run: deployment/phase6-agent-registry-production-update/scripts/validate-package.sh
      - run: deployment/phase6-agent-registry-production-update/scripts/test-disposable-lifecycle.sh "$DATABASE_TEST_URL"

  dashboard-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run typecheck:dashboard
      - run: npm run build:dashboard

  dashboard-api-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tanaghom_agents_api_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tanaghom_agents_api_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_api_test
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tanaghom_agents_api_test
      SUPABASE_URL: http://127.0.0.1:43191
      SUPABASE_PUBLISHABLE_KEY: integration-publishable-key
      APP_ENV: integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -f packages/database/seeds/staging.sql
      - run: npm run build:dashboard
      - run: npm run test:dashboard-api

  phase3-workflow-integration:
